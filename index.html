<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNC Quantum Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --success: #10b981; }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; color: #1e293b; }
        .navbar { background: var(--primary); color: white; border-radius: 0 0 25px 25px; padding: 1.5rem; }
        .card-panel { background: white; border-radius: 20px; border: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 2rem; }
        .nav-pills .nav-link { border-radius: 12px; font-weight: 600; padding: 12px; color: #64748b; }
        .nav-pills .nav-link.active { background-color: var(--accent) !important; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        #reader { border-radius: 20px; overflow: hidden; display: none; margin-bottom: 1rem; border: 3px solid var(--accent); }
        .btn-submit { background: var(--primary); color: white; border-radius: 12px; padding: 14px; font-weight: 700; width: 100%; border: none; transition: 0.3s; }
        .btn-submit:hover { background: #1e293b; transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar shadow-lg">
    <div class="container text-center">
        <h4 class="mb-0 fw-bold"><i class="fas fa-chart-line me-2 text-info"></i>PNC MANAGEMENT PRO</h4>
    </div>
</nav>

<div class="container mt-n4" style="max-width: 600px; margin-top: -20px;">
    
    <div class="card-panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold m-0 text-uppercase text-muted">Estadísticas en Vivo</h6>
            <button class="btn btn-sm btn-light" onclick="actualizarGraficos()"><i class="fas fa-sync"></i></button>
        </div>
        <div class="row text-center mb-4">
            <div class="col-6 border-end">
                <small class="text-muted d-block">PENDIENTES</small>
                <span id="count-abierto" class="stat-val text-danger">0</span>
            </div>
            <div class="col-6">
                <small class="text-muted d-block">RESUELTOS</small>
                <span id="count-cerrado" class="stat-val text-success">0</span>
            </div>
        </div>
        
        <canvas id="chartOperadores" height="150"></canvas>
    </div>

    <div class="card-panel">
        <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-3">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-reg">REPORTAR</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-sol">SOLUCIONAR</button></li>
        </ul>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="tab-reg">
                <div id="reader"></div>
                <button class="btn btn-outline-primary w-100 mb-3 rounded-3" onclick="startScan()">
                    <i class="fas fa-qrcode me-2"></i> ESCANEAR UBICACIÓN
                </button>
                
                <div class="mb-3">
                    <label class="small fw-bold text-muted">📍 UBICACIÓN DETECTADA</label>
                    <input type="text" id="ubicacion" class="form-control bg-light fw-bold" readonly>
                </div>

                <div class="mb-3">
                    <label class="small fw-bold text-muted">OPERADOR</label>
                    <select id="nombre" class="form-select">
                        <option>RICARDO SANTIAGO</option>
                        <option>JANIN AGUILAR</option>
                        <option>JOSE GONZALES</option>
                        <option>MICHAEL HERNANDE</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="small fw-bold text-muted">DETALLE DEL PNC</label>
                    <textarea id="detalle" class="form-control" rows="2" placeholder="Describe el problema..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="small fw-bold text-muted">FOTO EVIDENCIA</label>
                    <input type="file" id="foto" accept="image/*" capture="camera" class="form-control">
                </div>

                <button class="btn-submit" onclick="enviarReporte()">REGISTRAR INCIDENCIA</button>
            </div>

            <div class="tab-pane fade" id="tab-sol">
                <div class="text-center py-3">
                    <i class="fas fa-shield-check fa-3x text-success mb-2"></i>
                    <h6 class="fw-bold">VALIDACIÓN DE SUPERVISOR</h6>
                </div>
                <div class="mb-3">
                    <input type="text" id="idBusqueda" class="form-control form-control-lg text-center fw-bold" placeholder="PNC-XXXXX">
                </div>
                <div class="mb-3">
                    <input type="text" id="supervisor" class="form-control" placeholder="Nombre del Supervisor">
                </div>
                <button class="btn btn-success w-100 p-3 fw-bold rounded-3" onclick="cerrarPNC()">MARCAR COMO RESUELTO</button>
            </div>
        </div>
    </div>
</div>

<script>
    let miGrafico;

    // --- LÓGICA DE GRÁFICOS ---
    function actualizarGraficos() {
        google.script.run.withSuccessHandler(stats => {
            document.getElementById('count-abierto').innerText = stats.estatus["ABIERTO"];
            document.getElementById('count-cerrado').innerText = stats.estatus["CERRADO"];
            
            const ctx = document.getElementById('chartOperadores').getContext('2d');
            const labels = Object.keys(stats.operadores);
            const data = Object.values(stats.operadores);

            if (miGrafico) miGrafico.destroy();
            miGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Incidencias Reportadas',
                        data: data,
                        backgroundColor: '#3b82f6',
                        borderRadius: 8
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }).getEstadisticas();
    }

    // --- ESCÁNER ---
    function startScan() {
        const scanner = new Html5Qrcode("reader");
        document.getElementById('reader').style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            document.getElementById('ubicacion').value = text;
            scanner.stop();
            document.getElementById('reader').style.display = 'none';
        });
    }

    // --- ENVÍO DE DATOS ---
    async function enviarReporte() {
        const file = document.getElementById('foto').files[0];
        if(!file || !document.getElementById('ubicacion').value) return alert("Falta ubicación o foto");
        
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            const datos = {
                accion: "NUEVO",
                nombre: document.getElementById('nombre').value,
                ubicacion: document.getElementById('ubicacion').value,
                detalle: document.getElementById('detalle').value,
                turno: "MIXTO",
                foto: reader.result
            };
            google.script.run.withSuccessHandler(res => {
                alert(res);
                location.reload();
            }).procesarFormulario(datos);
        };
    }

    window.onload = actualizarGraficos;
</script>
</body>
</html>
